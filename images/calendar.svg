<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="200" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="29%" stop-color="#e2c06a"/>
      <stop offset="69%" stop-color="#b8840f"/>
    </linearGradient>
    <style>
      .cal-header { font-family: 'Open Sans', Arial, sans-serif; font-size: 11px; font-weight: 600; fill: url(#goldGrad); }
      .cal-day { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px; fill: #1c1c1c; }
      .cal-day-holiday { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 13px; fill: url(#goldGrad); font-weight: 600; }
      .cal-line { stroke: url(#goldGrad); stroke-width: 0.5; }
    </style>
  </defs>

  <!-- Header: ПН ВТ СР ЧТ ПТ СБ ВС -->
  <text x="10" y="20" class="cal-header">ПН</text>
  <text x="38" y="20" class="cal-header">ВТ</text>
  <text x="66" y="20" class="cal-header">СР</text>
  <text x="94" y="20" class="cal-header">ЧТ</text>
  <text x="122" y="20" class="cal-header">ПТ</text>
  <text x="150" y="20" class="cal-header">СБ</text>
  <text x="178" y="20" class="cal-header">ВС</text>

  <!-- Separator -->
  <line x1="5" y1="28" x2="195" y2="28" class="cal-line"/>

  <!-- Week 1: 1(Чт) - 4(Вс) -->
  <text x="94" y="48" class="cal-day">1</text>
  <text x="122" y="48" class="cal-day">2</text>
  <text x="150" y="48" class="cal-day-holiday">3</text>
  <text x="178" y="48" class="cal-day-holiday">4</text>

  <!-- Week 2: 5 - 11 -->
  <text x="10" y="70" class="cal-day">5</text>
  <text x="38" y="70" class="cal-day">6</text>
  <text x="66" y="70" class="cal-day">7</text>
  <text x="94" y="70" class="cal-day">8</text>
  <text x="122" y="70" class="cal-day">9</text>
  <text x="150" y="70" class="cal-day-holiday">10</text>
  <text x="178" y="70" class="cal-day-holiday">11</text>

  <!-- Week 3: 12 - 18 -->
  <text x="10" y="92" class="cal-day">12</text>
  <text x="38" y="92" class="cal-day">13</text>
  <text x="66" y="92" class="cal-day">14</text>
  <text x="94" y="92" class="cal-day">15</text>
  <text x="122" y="92" class="cal-day">16</text>
  <text x="150" y="92" class="cal-day-holiday">17</text>
  <text x="178" y="92" class="cal-day-holiday">18</text>

  <!-- Week 4: 19 - 25 -->
  <text x="10" y="114" class="cal-day">19</text>
  <text x="38" y="114" class="cal-day">20</text>
  <text x="66" y="114" class="cal-day">21</text>
  <text x="94" y="114" class="cal-day">22</text>
  <text x="122" y="114" class="cal-day">23</text>
  <text x="150" y="114" class="cal-day-holiday">24</text>
  <text x="178" y="114" class="cal-day-holiday">25</text>

  <!-- Week 5: 26 - 31 -->
  <text x="10" y="136" class="cal-day">26</text>
  <text x="38" y="136" class="cal-day">27</text>
  <text x="66" y="136" class="cal-day">28</text>
  <text x="94" y="136" class="cal-day">29</text>
  <text x="122" y="136" class="cal-day">30</text>
  <text x="150" y="136" class="cal-day-holiday">31</text>

  <!-- Separator -->
  <line x1="5" y1="148" x2="195" y2="148" class="cal-line"/>

  <!-- 10 highlighted -->
</svg>
